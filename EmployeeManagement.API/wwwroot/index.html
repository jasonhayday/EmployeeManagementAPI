<!DOCTYPE html>
<html>

<head>
    <title>Employee Management</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <h1>Employee Management</h1>

        <div class="top-bar">
            <div style="display:flex; gap:10px;">
                <button class="add-btn" onclick="openModal()">
                    <i class="fa fa-plus"></i> Add Employee
                </button>

                <div class="export-dropdown">
                    <button class="export-btn">
                        <i class="fa fa-download"></i> Export Data
                    </button>

                    <div class="export-menu">
                        <div onclick="exportExcel()">Export Excel</div>
                        <div onclick="exportCSV()">Export CSV</div>
                        <div onclick="exportPDF()">Export PDF</div>
                    </div>
                </div>

                <button class="dark-toggle" onclick="toggleDarkMode()">
                    <i class="fa fa-moon"></i>
                </button>
            </div>
            <input id="search" placeholder="Search employee..." onkeyup="searchEmployee()">
        </div>

        <div class="card">
            <table id="employeeTable">
                <thead>
                    <tr>
                        <th onclick="sortTable('id')">ID</th>
                        <th onclick="sortTable('name')">Name</th>
                        <th>Email</th>
                        <th>Department</th>
                        <th onclick="sortTable('salary')">Salary</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div id="pagination"></div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Employee</h2>
                <span class="close" onclick="closeModal()">×</span>
            </div>

            <input id="employeeId" type="hidden">

            <input id="name" maxlength="200" placeholder="Name">
            <input id="email" maxlength="200" type="email" placeholder="Email">
            <input id="department" maxlength="200" placeholder="Department">
            <input id="salary" inputmode="numeric" placeholder="Salary">

            <div class="modal-buttons">
                <button id="saveBtn" class="save" onclick="saveEmployee()">Save</button>
            </div>
        </div>
    </div>

    <!-- LOADING -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
    </div>

    <!-- TOAST -->
    <div id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

    <script src="app.js"></script>
</body>

</html>
